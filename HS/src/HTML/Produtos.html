<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <link rel="stylesheet" href="/HS/src/CSS/reset.css">

<body>

            <img class="logo2" src="/HS/img/logo2.png" alt="Logo Secundária"> <!-- Logo alinhada à esquerda -->
            <ul id="navMenu">

    <footer>
        <p>© 2024 HermeSport. Todos os direitos reservados.</p>
